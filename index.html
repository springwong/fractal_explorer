<script>
// Workaround: wgpu 22 sends maxInterStageShaderComponents which was
// removed from the WebGPU spec (Chrome 130+). Strip it before the call.
if (typeof GPUAdapter !== "undefined") {
    const orig = GPUAdapter.prototype.requestDevice;
    GPUAdapter.prototype.requestDevice = function(desc) {
        if (desc && desc.requiredLimits) {
            delete desc.requiredLimits.maxInterStageShaderComponents;
        }
        return orig.call(this, desc);
    };
