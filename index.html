<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fractal Explorer</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            background: #000;
            position: fixed;
            top: 0;
            left: 0;
        }
        canvas {
            width: 100% !important;
            height: 100dvh !important;
            display: block !important;
            touch-action: none;
        }
    </style>
    <link data-trunk rel="rust" data-wasm-opt="z" />
</head>
<body>
<script>
// Workaround: wgpu 22 sends maxInterStageShaderComponents which was
// removed from the WebGPU spec (Chrome 130+). Strip it before the call.
if (typeof GPUAdapter !== "undefined") {
    const orig = GPUAdapter.prototype.requestDevice;
    GPUAdapter.prototype.requestDevice = function(desc) {
        if (desc && desc.requiredLimits) {
            delete desc.requiredLimits.maxInterStageShaderComponents;
        }
        return orig.call(this, desc);
    };
}

// Use ResizeObserver to sync canvas pixel buffer to its actual CSS layout size.
// This fires whenever the canvas layout changes (initial load, rotation, address bar).
// Unlike window.innerHeight, the observed size reflects the real rendered dimensions.
(function() {
    function watchCanvas() {
        const canvas = document.querySelector("canvas");
        if (!canvas) {
            // Canvas isn't in DOM yet (wasm still loading), retry
            requestAnimationFrame(watchCanvas);
            return;
        }
        const observer = new ResizeObserver(function(entries) {
            for (const entry of entries) {
                const dpr = window.devicePixelRatio || 1;
                // Use contentBoxSize for the actual CSS layout dimensions
                let cssW, cssH;
                if (entry.contentBoxSize && entry.contentBoxSize[0]) {
                    cssW = entry.contentBoxSize[0].inlineSize;
                    cssH = entry.contentBoxSize[0].blockSize;
                } else {
                    // Fallback for older browsers
                    cssW = entry.contentRect.width;
                    cssH = entry.contentRect.height;
                }
                const pixelW = Math.round(cssW * dpr);
                const pixelH = Math.round(cssH * dpr);
                if (pixelW > 0 && pixelH > 0 && (canvas.width !== pixelW || canvas.height !== pixelH)) {
                    canvas.width = pixelW;
                    canvas.height = pixelH;
                    window.dispatchEvent(new Event("resize"));
                }
            }
        });
        observer.observe(canvas);
    }
    watchCanvas();
})();
</script>
</body>
</html>
